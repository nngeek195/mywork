name: Build Windows EXE

# This controls when the workflow will run
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  build:
    # This tells GitHub to boot up a Windows machine!
    runs-on: windows-latest 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Change this to match your Python version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      # Add --noconsole here if you don't want a background terminal window
      run: pyinstaller --onefile webcam_client.py 

    - name: Upload EXE as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: webcam-client-windows-exe
        path: dist/webcam_client.exe